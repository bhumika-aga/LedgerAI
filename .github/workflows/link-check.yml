name: Link Check

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Weekly reachability check of external (http/https) links in the documentation. It is deliberately
# scoped to remote URLs only — relative links between documents are already validated by docs.yml, so
# the two never overlap. Retries and a tolerant status set absorb transient failures; a link that
# stays broken across retries fails the run.

permissions:
  contents: read

jobs:
  external-links:
    name: Check external documentation links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --scheme https
            --scheme http
            --max-retries 3
            --retry-wait-time 10
            --accept 200,206,429
            --no-progress
            'docs/**/*.md'
            'README.md'
          fail: true
