name: Build

on:
  push:
    branches: [ main ]
    paths: [ 'backend/**', 'frontend/**', '.github/workflows/build.yml' ]
  pull_request:
    paths: [ 'backend/**', 'frontend/**', '.github/workflows/build.yml' ]
  workflow_dispatch:

# No application code exists yet. Each job builds only when its manifest is present, so this workflow
# is inert until backend/frontend code lands and then activates automatically. Toolchain choices follow
# the stack recorded in README.md (Java 21 + Maven; Vite/npm) — adjust if that record changes.
# Tests are run separately (see test.yml), per docs/03-engineering/TESTING_STRATEGY.md.

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for backend manifest
        id: manifest
        run: |
          if [ -f backend/pom.xml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No backend/pom.xml yet — nothing to build."
          fi

      - name: Set up JDK 21
        if: steps.manifest.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Package (skip tests)
        if: steps.manifest.outputs.present == 'true'
        working-directory: backend
        run: mvn -B -ntp -DskipTests package

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for frontend manifest
        id: manifest
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No frontend/package.json yet — nothing to build."
          fi

      - name: Set up Node
        if: steps.manifest.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        if: steps.manifest.outputs.present == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build --if-present
