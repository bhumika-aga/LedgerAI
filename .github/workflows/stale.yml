name: Stale

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Housekeeping only: nudges issues and pull requests that have gone quiet, and closes them after a
# further grace period. It expresses no policy about the work itself — governance, routing, and
# priority live in docs/ and CLAUDE.md, not here. Domains that should never lapse are exempted.

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: >
            This issue has had no activity for 60 days and is now marked stale.
            Comment to keep it open; otherwise it will be closed in 14 days.
          stale-pr-message: >
            This pull request has had no activity for 60 days and is now marked stale.
            Comment or push to keep it open; otherwise it will be closed in 14 days.
          close-issue-message: >
            Closing after 60 days stale plus 14 days with no further activity. Reopen if still relevant.
          close-pr-message: >
            Closing after 60 days stale plus 14 days with no further activity. Reopen if still relevant.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: security,architecture,documentation,pinned
          exempt-pr-labels: security,architecture,documentation,pinned
          operations-per-run: 30
          ascending: true
