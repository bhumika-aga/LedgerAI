spring:
  application:
    name: ledgerai-backend

  # Datasource is fully externalized and environment-driven; no credentials live in source
  # (SECURITY §13, BACKEND_CODING_STANDARDS §11). Values are supplied per environment; tests supply
  # them from a disposable container (ADR-017), so no defaults are baked in here.
  datasource:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}

  jpa:
    # The schema is owned entirely by migrations (ADR-016); Hibernate never creates or alters it.
    hibernate:
      ddl-auto: none
    open-in-view: false

  # Flyway is the sole schema authority (ADR-016) and runs before persistence initializes.
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Multipart uploads (API_SPEC §8.1). The container ceiling sits above the app's VR-005 limit
  # (documents.max-file-size) so the service produces a clean field-level 422; a request that exceeds
  # this hard ceiling is rejected as 413 by the handler. Tunable per environment.
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:30MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:30MB}

  # Pagination contract (API_SPEC §2.5): zero-based `page`, default `size` 20, max 100 [Assumption],
  # `sort` as `field,(asc|desc)`. Spring Data's resolver already speaks exactly this dialect, so the
  # contract is configured here rather than reimplemented. Per-resource default ordering is declared on
  # the endpoint, since §2.5 defines it as a "resource default".
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

# Authentication configuration (SECURITY §13; ADR-001, ADR-018). All values are externalized; the
# JWT signing secret has no default and MUST be supplied by the environment — the app fails fast if
# it is absent. Token lifetimes, cookie attributes, and trusted CORS origins are configuration, not
# code constants. The cookie is Secure + SameSite=Strict by default (same-site deployment, ADR-018).
auth:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
  refresh-token:
    ttl: ${REFRESH_TOKEN_TTL:30d}
  cookie:
    name: ${AUTH_COOKIE_NAME:refresh_token}
    secure: ${AUTH_COOKIE_SECURE:true}
    same-site: ${AUTH_COOKIE_SAME_SITE:Strict}
    path: ${AUTH_COOKIE_PATH:/api/v1/auth}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  password-min-length: ${AUTH_PASSWORD_MIN_LENGTH:8}

# Profile validation limits (VR-003). The SRS marks the concrete lengths as an [Assumption] and
# API_SPEC §18 defers them to the SRS/architecture, where they are not yet finalized — so they live
# here as tunable configuration rather than as product commitments baked into code, exactly as the
# password threshold does above (SECURITY §6).
users:
  profile:
    max-full-name-length: ${PROFILE_MAX_FULL_NAME_LENGTH:255}
    max-professional-details-length: ${PROFILE_MAX_PROFESSIONAL_DETAILS_LENGTH:2000}
    max-preferences-bytes: ${PROFILE_MAX_PREFERENCES_BYTES:8192}

# Client validation limits (VR-004). The name limit mirrors the "≤ 200 chars" DATABASE §5.2 records,
# which the SRS marks [Assumption]; VR-004 requires optional fields to be "validated if present" but
# states no limit for them, so those two defaults are engineering choices. All are tunable rather than
# product commitments baked into code — the same treatment as the password (VR-001) and profile (VR-003)
# thresholds above.
clients:
  max-name-length: ${CLIENT_MAX_NAME_LENGTH:200}
  max-contact-details-length: ${CLIENT_MAX_CONTACT_DETAILS_LENGTH:2000}
  max-notes-length: ${CLIENT_MAX_NOTES_LENGTH:5000}

# Document upload validation limits (VR-005). The SRS marks allowed types and max size an
# [Assumption, to be fixed in SRS/architecture] and they are not finalized, so — like the password
# (VR-001), profile (VR-003) and client (VR-004) thresholds — they are tunable configuration, not
# product commitments in code. The download-url TTL keeps signed links short-lived (SECURITY §9).
documents:
  max-file-size: ${DOCUMENT_MAX_FILE_SIZE:25MB}
  allowed-mime-types: ${DOCUMENT_ALLOWED_MIME_TYPES:application/pdf,image/png,image/jpeg}
  download-url-ttl: ${DOCUMENT_DOWNLOAD_URL_TTL:5m}

# Storage provider (ADR-002 → Supabase Storage; ADR-008 pattern). All values are environment-driven and
# server-held; the service key is a secret and has no default (SECURITY §13). Consumed only by the
# Supabase Storage adapter, which is absent from the test profile.
storage:
  url: ${STORAGE_URL:}
  bucket: ${STORAGE_BUCKET:}
  service-key: ${STORAGE_SERVICE_KEY:}

# Baseline observability (ADR-015): expose only the health endpoint required by the Phase 0
# foundation. Broader endpoints, metrics, and per-environment configuration are added by the
# slices that introduce them. Secrets and environment-specific values are always externalized.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
